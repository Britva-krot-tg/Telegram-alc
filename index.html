<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MINE ALBION COIN</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0b0e14;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: url('bg.png') no-repeat center center;
            background-size: cover;
            background-color: var(--bg-color);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            perspective: 1000px;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1;
        }

        .header {
            margin-top: 40px;
            text-align: center;
            z-index: 10;
        }

        .score-container {
            font-size: 50px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .click-area {
            position: relative;
            flex-grow: 1;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1000px;
            z-index: 5;
        }

        .main-button {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            background: url('coin.png') no-repeat center center;
            background-size: contain;
            /* Подсветка полностью убрана */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: transform 0.15s ease-out, filter 0.15s ease-out;
            transform-style: preserve-3d;
            /* Кнопка гарантированно принимает клики самостоятельно */
            pointer-events: auto; 
            -webkit-tap-highlight-color: transparent;
        }

        .floating-text {
            position: absolute;
            font-size: 28px;
            font-weight: 800;
            color: #ffd700;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
            z-index: 100;
            text-shadow: 0 2px 10px rgba(255, 215, 0, 0.6);
            transform: translate(-50%, -50%);
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translate(-50%, -50%) translateY(0) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) translateY(-160px) scale(1.3); }
        }

        .info-panel {
            margin-bottom: 40px;
            padding: 12px 30px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-weight: 500;
            color: #e0e0e0;
            z-index: 10;
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>

    <div class="header">
        <div id="username" style="color: #ccc; margin-bottom: 5px; font-weight: 600;">Игрок</div>
        <div class="score-container">
            <span id="score">0.0000</span>
        </div>
    </div>

    <div class="click-area" id="clickArea">
        <div class="main-button" id="clickBtn"></div>
    </div>

    <div class="info-panel">
        Награда: +0.0025 ALC за тап
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        if (tg) {
            tg.expand();
            if (tg.ready) tg.ready();
        }

        const scoreEl = document.getElementById('score');
        const usernameEl = document.getElementById('username');
        const clickBtn = document.getElementById('clickBtn');
        const clickArea = document.getElementById('clickArea');

        const REWARD = 0.0025;

        let score = parseFloat(localStorage.getItem('ton_balance_v3')) || 0;
        scoreEl.innerText = score.toFixed(4);

        if (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) {
            usernameEl.innerText = tg.initDataUnsafe.user.first_name;
        }

        function handleInteraction(clientX, clientY) {
            score += REWARD;
            scoreEl.innerText = score.toFixed(4);
            localStorage.setItem('ton_balance_v3', score);

            if (tg && tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('light');
            }

            applyTilt(clientX, clientY);
            showPlusText(clientX, clientY);
        }

        function applyTilt(clientX, clientY) {
            const rect = clickBtn.getBoundingClientRect();
            const coinCenterX = rect.left + rect.width / 2;
            const coinCenterY = rect.top + rect.height / 2;

            const deltaX = clientX - coinCenterX;
            const deltaY = clientY - coinCenterY;

            const percentX = deltaX / (rect.width / 2);
            const percentY = deltaY / (rect.height / 2);

            const maxTilt = 25; 

            const tiltX = -percentY * maxTilt;
            const tiltY = percentX * maxTilt;

            clickBtn.style.transition = 'none';
            clickBtn.style.transform = `rotateX(${tiltX}deg) rotateY(${tiltY}deg) scale(0.95)`;
            clickBtn.style.filter = 'brightness(0.9)';

            setTimeout(() => {
                clickBtn.style.transition = 'transform 0.15s ease-out, filter 0.15s ease-out';
                clickBtn.style.transform = 'rotateX(0deg) rotateY(0deg) scale(1)';
                clickBtn.style.filter = 'brightness(1)';
            }, 100);
        }

        // События переназначены строго на clickBtn (монету)
        clickBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            for (let i = 0; i < e.changedTouches.length; i++) {
                handleInteraction(e.changedTouches[i].clientX, e.changedTouches[i].clientY);
            }
        }, { passive: false });

        clickBtn.addEventListener('mousedown', (e) => {
            handleInteraction(e.clientX, e.clientY);
        });

        function showPlusText(x, y) {
            const text = document.createElement('div');
            text.className = 'floating-text';
            text.innerText = '+' + REWARD.toFixed(4);
            
            const rect = clickArea.getBoundingClientRect();
            const relativeX = x - rect.left;
            const relativeY = y - rect.top;

            text.style.left = relativeX + 'px';
            text.style.top = relativeY + 'px';

            clickArea.appendChild(text);
            setTimeout(() => text.remove(), 800);
        }
    </script>
</body>
</html>
