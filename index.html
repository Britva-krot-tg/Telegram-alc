<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MINE ALBION COIN</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script defer src="https://unpkg.com/@tonconnect/ui@2.0.6/dist/tonconnect-ui.min.js"></script>
    <!-- Подключение Supabase -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #0b0e14;
            --ton-blue: #0088cc;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: url('bg.png') no-repeat center center;
            background-size: cover;
            background-color: var(--bg-color);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            perspective: 1000px;
        }

        .bg-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1;
            pointer-events: none;
        }

        .top-bar {
            width: 90%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            z-index: 100;
        }

        #ton-connect-btn {
            z-index: 101;
            min-height: 40px;
        }

        /* Кнопка-картинка для магазина */
        .shop-trigger-btn {
            background: url('1000005730.png') no-repeat center center;
            background-size: contain;
            width: 55px;
            height: 55px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            z-index: 102;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.1s ease;
        }

        .shop-trigger-btn:active {
            transform: scale(0.9);
        }

        .header {
            margin-top: 10px;
            text-align: center;
            z-index: 10;
        }

        .score-container {
            font-size: 50px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
        }

        .click-area {
            position: relative;
            flex-grow: 1;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1000px;
            z-index: 5;
        }

        .main-button {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            background: url('coin.png') no-repeat center center;
            background-size: contain;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 99; 
            transition: transform 0.05s ease-out, filter 0.05s ease-out;
            transform-style: preserve-3d;
            pointer-events: auto;
            -webkit-tap-highlight-color: transparent;
        }

        .main-button.blocked {
            filter: brightness(0.6) sepia(1) hue-rotate(-50deg) saturate(3) !important;
        }

        .floating-text {
            position: absolute;
            font-size: 28px;
            font-weight: 800;
            color: #ffd700;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
            z-index: 1000;
            text-shadow: 0 2px 10px rgba(255, 215, 0, 0.6);
            transform: translate(-50%, -50%);
        }
        .floating-text.warning {
            color: #ff3333;
            font-size: 22px;
            text-shadow: 0 2px 10px rgba(255, 0, 0, 0.8);
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translate(-50%, -50%) translateY(0) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) translateY(-160px) scale(1.3); }
        }

        .bottom-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 40px;
            gap: 12px;
            z-index: 10;
        }

        .energy-container {
            width: 70%;
            max-width: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .energy-text {
            font-size: 16px;
            font-weight: 600;
            color: #ffd700;
            text-shadow: 0 1px 5px rgba(0,0,0,0.5);
        }

        .energy-bar-bg {
            width: 100%;
            height: 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            overflow: hidden;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        }

        .energy-bar-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ffa500);
            border-radius: 10px;
            transition: width 0.1s linear;
            box-shadow: 0 0 8px rgba(255, 215, 0, 0.5);
        }

        .cooldown-timer {
            font-size: 13px;
            color: #8a94a6;
            font-weight: 500;
            margin-top: 2px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Картинка-фон для окна магазина */
        .modal-content {
            background: url('1000005732.jpg') no-repeat center center;
            background-size: cover;
            position: relative;
            width: 85%;
            max-width: 340px;
            height: 75vh;
            max-height: 560px;
            border-radius: 24px;
            padding: 20px;
            border: 2px solid rgba(212, 175, 55, 0.4);
            box-shadow: 0 10px 30px rgba(0,0,0,0.9);
            text-align: center;
            transform: translateY(20px);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }

        /* Затемняющая подложка внутри магазина для читаемости текста */
        .modal-blur-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(11, 14, 20, 0.65);
            border-radius: 22px;
            z-index: 1;
        }

        .modal-inner-content {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .modal-title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #ffd700;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }
        .upgrade-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 5px;
        }

        .upgrade-item {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .upgrade-item.bought {
            border-color: #00ff66;
            background: rgba(0, 255, 102, 0.1);
        }

        .upgrade-info {
            text-align: left;
        }

        .upgrade-name {
            font-weight: bold;
            font-size: 14px;
            color: #fff;
        }

        .upgrade-desc {
            font-size: 11px;
            color: #b0b8c6;
            margin-top: 2px;
        }

        .upgrade-btn {
            background: var(--ton-blue);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .upgrade-btn:disabled {
            background: #2c3545;
            color: #68758c;
            cursor: not-allowed;
            box-shadow: none;
        }

        .close-modal-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255,255,255,0.3);
            color: #fff;
            padding: 8px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(5px);
            margin-top: 10px;
        }
        
        #loading-overlay {
            position: fixed;
            top:0; left:0; right:0; bottom:0;
            background: #0b0e14;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            font-weight: bold;
            color: #ffd700;
            transition: opacity 0.3s ease;
        }
    </style>
</head>
<body>
    <!-- Экран загрузки облачного баланса -->
    <div id="loading-overlay">Loading cloud data...</div>

    <div class="bg-overlay"></div>

    <div class="top-bar">
        <!-- Кнопка магазина (стилизована картинкой 1000005730.png через CSS) -->
        <button class="shop-trigger-btn" id="openShopBtn"></button>
        <div id="ton-connect-btn"></div>
    </div>

    <div class="header">
        <div id="username" style="color: #ccc; margin-bottom: 5px; font-weight: 600;">Player</div>
        <div class="score-container">
            <span id="score">0.0000</span>
        </div>
    </div>

    <div class="click-area" id="clickArea">
        <div class="main-button" id="clickBtn"></div>
    </div>

    <div class="bottom-container">
        <div class="energy-container">
            <div class="energy-text">⚡ <span id="energyValue">400</span> / <span id="maxEnergyValue">400</span></div>
            <div class="energy-bar-bg">
                <div class="energy-bar-fill" id="energyFill"></div>
            </div>
            <div class="cooldown-timer" id="cooldownTimer">Ready to charge</div>
        </div>
    </div>

    <!-- Модальное окно Магазина (фон 1000005732.jpg настроен в CSS) -->
    <div class="modal-overlay" id="shopModal">
        <div class="modal-content">
            <div class="modal-blur-overlay"></div>
            
            <div class="modal-inner-content">
                <div class="modal-title">⚡ Energy Upgrade</div>
                <div class="upgrade-list">
                    
                    <div class="upgrade-item" id="item-l1">
                        <div class="upgrade-info">
                            <div class="upgrade-name">Energy Lvl.1 (×2)</div>
                            <div class="upgrade-desc">Maximum: 800 energy</div>
                        </div>
                        <button class="upgrade-btn" id="btn-l1" onclick="buyUpgrade(1, 2)">2 TON</button>
                    </div>

                    <div class="upgrade-item" id="item-l2">
                        <div class="upgrade-info">
                            <div class="upgrade-name">Energy Lvl.2 (×10)</div>
                            <div class="upgrade-desc">Maximum: 4000 energy</div>
                        </div>
                        <button class="upgrade-btn" id="btn-l2" onclick="buyUpgrade(2, 10)">10 TON</button>
                    </div>

                    <div class="upgrade-item" id="item-l3">
                        <div class="upgrade-info">
                            <div class="upgrade-name">Energy Lvl.3 (×50)</div>
                            <div class="upgrade-desc">Maximum: 20000 energy</div>
                        </div>
                        <button class="upgrade-btn" id="btn-l3" onclick="buyUpgrade(3, 45)">45 TON</button>
                    </div>

                    <div class="upgrade-item" id="item-l4">
                        <div class="upgrade-info">
                            <div class="upgrade-name">Energy Lvl.4 (×100)</div>
                            <div class="upgrade-desc">Maximum: 40000 energy</div>
                        </div>
                        <button class="upgrade-btn" id="btn-l4" onclick="buyUpgrade(4, 85)">85 TON</button>
                    </div>

                </div>
                <button class="close-modal-btn" id="closeShopBtn">Close</button>
            </div>
        </div>
    </div>
    <script>
        // --- ⚠️ НАСТРОЙКИ БАЗЫ ДАННЫХ SUPABASE (ВСТАВЬ СВОИ) ⚠️ ---
        const SUPABASE_URL = "https://bgkyseldpfefdqlwnsjm.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJna3lzZWxkcGZlZmRxbHduc2ptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxNTI4MDgsImV4cCI6MjA5NDcyODgwOH0.EtVQ03ao0z63S5sAMPeGf8FAfGgjcv8Ix9UC8sGkDfw";

        let supabase = null;
        try {
            if (typeof window.supabase !== 'undefined' && SUPABASE_URL.indexOf("your-project") === -1) {
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            }
        } catch(e) {
            console.error("Ошибка инициализации Supabase клиента:", e);
        }

        // --- TON DATA SETTINGS ---
        const MY_TON_WALLET = "UQBT3bJqKbJMgQpWc4I5zPc15ep1eFxwuo-ocyTQ6WyJKV8q";
        const MY_MANIFEST_URL = "https://britva-krot-tg.github.io/Telegram-alc/tonconnect-manifest.json";

        const tg = window.Telegram.WebApp;
        if (tg) {
            tg.expand();
            if (tg.ready) tg.ready();
        }

        let tonConnectUI = null;

        const scoreEl = document.getElementById('score');
        const usernameEl = document.getElementById('username');
        const clickBtn = document.getElementById('clickBtn');
        const clickArea = document.getElementById('clickArea');
        const energyValueEl = document.getElementById('energyValue');
        const maxEnergyValueEl = document.getElementById('maxEnergyValue');
        const energyFillEl = document.getElementById('energyFill');
        const cooldownTimerEl = document.getElementById('cooldownTimer');
        const shopModal = document.getElementById('shopModal');
        const openShopBtn = document.getElementById('openShopBtn');
        const closeShopBtn = document.getElementById('closeShopBtn');

        const REWARD = 0.0025;
        const MAX_CPS = 9;
        const BASE_ENERGY = 400;
        const REGEN_TIME_MS = 8 * 60 * 60 * 1000;

        // Глобальные переменные состояния
        let myTelegramId = 0; 
        let myFirstName = "Player";
        let currentUpgradeLevel = 0;
        let score = 0.0;
        let maxEnergy = BASE_ENERGY;
        let currentEnergy = BASE_ENERGY;
        let lastClickTime = Date.now();

        // Парсинг Telegram ID пользователя
        if (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) {
            myTelegramId = tg.initDataUnsafe.user.id;
            myFirstName = tg.initDataUnsafe.user.first_name;
            usernameEl.innerText = myFirstName;
        } else {
            myTelegramId = 999999999; 
            usernameEl.innerText = "PC_Test_User";
        }

        function getMaxEnergy() {
            if (currentUpgradeLevel === 1) return BASE_ENERGY * 2;   
            if (currentUpgradeLevel === 2) return BASE_ENERGY * 10;  
            if (currentUpgradeLevel === 3) return BASE_ENERGY * 50;  
            if (currentUpgradeLevel === 4) return BASE_ENERGY * 100;
            return BASE_ENERGY;
        }

        // Функция скрытия экрана загрузки
        function hideLoadingOverlay() {
            const loader = document.getElementById('loading-overlay');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 300);
            }
        }

        // БЕЗОПАСНАЯ КЛАУД-ЗАГРУЗКА ИЗ БАЗЫ С ТАЙМАУТОМ
        async function loadPlayerData() {
            // Если Supabase не подключен вообще, сразу включаем локальный режим
            if (!supabase) {
                console.log("Supabase не настроен. Запуск в локальном режиме.");
                loadFallbackData();
                hideLoadingOverlay();
                return;
            }

            // Создаем таймер прерывания на 3 секунды, чтобы игра не висла вечно
            const timeoutPromise = new Promise((_, reject) => 
                setTimeout(() => reject(new Error("Supabase timeout")), 3000)
            );
            try {
                // Пытаемся получить данные из базы данных с ограничением по времени
                const networkPromise = supabase
                    .from('players')
                    .select('*')
                    .eq('telegram_id', myTelegramId)
                    .maybeSingle(); // Использование maybeSingle безопаснее, чем single

                const { data: player, error } = await Promise.race([networkPromise, timeoutPromise]);

                if (error) throw error;

                if (!player) {
                    // Нового игрока регистрируем в таблице
                    const newPlayer = {
                        telegram_id: myTelegramId,
                        username: myFirstName,
                        balance: 0.0,
                        current_energy: BASE_ENERGY,
                        upgrade_level: 0,
                        last_click_time: Date.now()
                    };
                    await supabase.from('players').insert([newPlayer]);
                    loadFallbackData();
                } else {
                    // Старый игрок — подтягиваем значения
                    score = parseFloat(player.balance) || 0;
                    currentUpgradeLevel = parseInt(player.upgrade_level) || 0;
                    lastClickTime = parseInt(player.last_click_time) || Date.now();
                    maxEnergy = getMaxEnergy();
                    currentEnergy = player.current_energy !== null ? parseFloat(player.current_energy) : maxEnergy;
                }

            } catch (err) {
                console.error("Ошибка облака, переключение на локальный localStorage:", err);
                // Если база данных упала или зависла — берем данные из localStorage, чтобы игрок мог играть
                loadFallbackData();
            } finally {
                // В любом случае обновляем интерфейс и убираем заставку
                scoreEl.innerText = score.toFixed(4);
                regenerateEnergy();
                hideLoadingOverlay();
            }
        }

        // Запасная функция загрузки из localStorage, если база не отвечает
        function loadFallbackData() {
            score = parseFloat(localStorage.getItem('clicker_score')) || 0.0;
            currentUpgradeLevel = parseInt(localStorage.getItem('clicker_upgrade_level')) || 0;
            lastClickTime = parseInt(localStorage.getItem('clicker_last_click_time')) || Date.now();
            maxEnergy = getMaxEnergy();
            currentEnergy = localStorage.getItem('clicker_current_energy') !== null ? parseFloat(localStorage.getItem('clicker_current_energy')) : maxEnergy;
        }

        // СИНХРОНИЗАЦИЯ С ОБЛАКОМ И LOCALSTORAGE
        async function savePlayerData() {
            // Сначала сохраняем локально (надежно)
            localStorage.setItem('clicker_score', score);
            localStorage.setItem('clicker_current_energy', currentEnergy);
            localStorage.setItem('clicker_upgrade_level', currentUpgradeLevel);
            localStorage.setItem('clicker_last_click_time', lastClickTime);

            // Если база работает — шлем и туда
            if (supabase) {
                try {
                    await supabase
                        .from('players')
                        .update({ 
                            balance: score, 
                            current_energy: currentEnergy, 
                            upgrade_level: currentUpgradeLevel,
                            last_click_time: lastClickTime
                        })
                        .eq('telegram_id', myTelegramId);
                } catch(e) {
                    console.error("Не удалось сохранить в облако:", e);
                }
            }
        }

        function regenerateEnergy() {
            const now = Date.now();
            const timePassed = now - lastClickTime;
            maxEnergy = getMaxEnergy();
            const energyPerMs = maxEnergy / REGEN_TIME_MS;
            if (timePassed > 0 && currentEnergy < maxEnergy) {
                currentEnergy += timePassed * energyPerMs;
                if (currentEnergy > maxEnergy) currentEnergy = maxEnergy;
            }
            lastClickTime = now;
            updateEnergyUI();
        }

        function updateEnergyUI() {
            maxEnergy = getMaxEnergy();
            maxEnergyValueEl.innerText = maxEnergy;
            const displayEnergy = Math.floor(currentEnergy);
            energyValueEl.innerText = displayEnergy;
            const percent = (currentEnergy / maxEnergy) * 100;
            energyFillEl.style.width = percent + '%';

            if (currentEnergy >= maxEnergy) {
                cooldownTimerEl.innerText = "";
            } else {
                const energyNeeded = maxEnergy - currentEnergy;
                const energyPerMs = maxEnergy / REGEN_TIME_MS;
                const msRemaining = energyNeeded / energyPerMs;
                const totalSeconds = Math.ceil(msRemaining / 1000);
                const hours = Math.floor(totalSeconds / 3600);
                const minutes = Math.floor((totalSeconds % 3600) / 60);
                const seconds = totalSeconds % 60;

                const displayHours = String(hours).padStart(2, '0');
                const displayMinutes = String(minutes).padStart(2, '0');
                const displaySeconds = String(seconds).padStart(2, '0');

                cooldownTimerEl.innerText = Full in: ${displayHours}:${displayMinutes}:${displaySeconds};
            }
        }

        openShopBtn.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            updateShopUI();
            shopModal.classList.add('active');
        });
        
        closeShopBtn.addEventListener('click', (e) => {
            e.preventDefault();
            shopModal.classList.remove('active');
        });

        function updateShopUI() {
            for (let i = 1; i <= 4; i++) {
                const btn = document.getElementById(btn-l${i});
                const row = document.getElementById(item-l${i});
                if(!btn || !row) continue;
                
                if (i <= currentUpgradeLevel) {
                    row.classList.add('bought');
                    btn.innerText = "Purchased";
                    btn.disabled = true;
                } else if (i !== currentUpgradeLevel + 1) {
                    btn.disabled = true;
                } else {
                    row.classList.remove('bought');
                    btn.disabled = false;
                    if(i===1) btn.innerText = "2 TON";
                    if(i===2) btn.innerText = "10 TON";
                    if(i===3) btn.innerText = "45 TON";
                    if(i===4) btn.innerText = "85 TON";
                }
            }
        }

        async function buyUpgrade(level, priceTon) {
            if (!tonConnectUI || !tonConnectUI.connected) {
                return;
            }

            const nanoAmount = (priceTon * 1000000000).toString();
            const transaction = {
                validUntil: Math.floor(Date.now() / 1000) + 300,
                messages: [{ address: MY_TON_WALLET, amount: nanoAmount }]
            };

            try {
                const result = await tonConnectUI.sendTransaction(transaction);
                if (result) {
                    currentUpgradeLevel = level;
                    maxEnergy = getMaxEnergy();
                    currentEnergy = maxEnergy; 
                    lastClickTime = Date.now();
                    
                    await savePlayerData(); 
                    
                    updateEnergyUI();
                    updateShopUI();
                }
            } catch (error) {
                console.log("Transaction canceled.");
            }
        }
        let clickTimestamps = [];
        function checkClickRate() {
            const now = Date.now();
            clickTimestamps = clickTimestamps.filter(timestamp => now - timestamp < 1000);
            clickTimestamps.push(now);
            return clickTimestamps.length <= MAX_CPS;
        }

        function handleInteraction(clientX, clientY) {
            if (shopModal.classList.contains('active')) return;

            const isClickValid = checkClickRate();
            if (!isClickValid) {
                clickBtn.classList.add('blocked');
                if (tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
                showWarningText(clientX, clientY, "Too Fast!");
                return;
            }

            regenerateEnergy();
            if (currentEnergy < 1) {
                if (tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('warning');
                showWarningText(clientX, clientY, "No Energy! ⚡");
                clickBtn.style.transform = 'scale(0.9)';
                setTimeout(() => clickBtn.style.transform = 'scale(1)', 100);
                return;
            }

            clickBtn.classList.remove('blocked');

            currentEnergy -= 1;
            score += REWARD;
            scoreEl.innerText = score.toFixed(4);
            lastClickTime = Date.now();

            updateEnergyUI();

            if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            applyTilt(clientX, clientY);
            showPlusText(clientX, clientY);
        }

        function applyTilt(clientX, clientY) {
            if (clickBtn.classList.contains('blocked') || currentEnergy < 1) return;
            const rect = clickBtn.getBoundingClientRect();
            const coinCenterX = rect.left + rect.width / 2;
            const coinCenterY = rect.top + rect.height / 2;
            const deltaX = clientX - coinCenterX;
            const deltaY = clientY - coinCenterY;
            const percentX = deltaX / (rect.width / 2);
            const percentY = deltaY / (rect.height / 2);
            const maxTilt = 25; 
            const tiltX = -percentY * maxTilt;
            const tiltY = percentX * maxTilt;

            clickBtn.style.transition = 'none';
            clickBtn.style.transform = rotateX(${tiltX}deg) rotateY(${tiltY}deg) scale(0.95);
            clickBtn.style.filter = 'brightness(0.9)';

            setTimeout(() => {
                if (!clickBtn.classList.contains('blocked')) {
                    clickBtn.style.transition = 'transform 0.05s ease-out, filter 0.05s ease-out';
                    clickBtn.style.transform = 'rotateX(0deg) rotateY(0deg) scale(1)';
                    clickBtn.style.filter = 'brightness(1)';
                }
            }, 40);
        }

        setInterval(() => {
            const now = Date.now();
            clickTimestamps = clickTimestamps.filter(timestamp => now - timestamp < 1000);
            if (clickTimestamps.length <= MAX_CPS && currentEnergy >= 1) {
                clickBtn.classList.remove('blocked');
            }
        }, 500);

        clickBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            for (let i = 0; i < e.changedTouches.length; i++) {
                handleInteraction(e.changedTouches[i].clientX, e.changedTouches[i].clientY);
            }
        }, { passive: false });

        clickBtn.addEventListener('mousedown', (e) => {
            handleInteraction(e.clientX, e.clientY);
        });

        function showPlusText(x, y) {
            const text = document.createElement('div');
            text.className = 'floating-text';
            text.innerText = '+' + REWARD.toFixed(4);
            setupFloatingTextPosition(text, x, y);
        }

        function showWarningText(x, y, message) {
            const text = document.createElement('div');
            text.className = 'floating-text warning';
            text.innerText = message;
            setupFloatingTextPosition(text, x, y);
        }
        function setupFloatingTextPosition(text, x, y) {
            const rect = clickArea.getBoundingClientRect();
            const relativeX = x - rect.left;
            const relativeY = y - rect.top;
            text.style.left = relativeX + 'px';
            text.style.top = relativeY + 'px';
            clickArea.appendChild(text);
            setTimeout(() => text.remove(), 800);
        }
        
        window.addEventListener('DOMContentLoaded', () => {
            // Запуск безопасной загрузки
            loadPlayerData();

            setTimeout(() => {
                try {
                    if (typeof TON_CONNECT_UI !== 'undefined') {
                        tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
                            manifestUrl: MY_MANIFEST_URL,
                            buttonRootId: 'ton-connect-btn',
                            uiOptions: {
                                uiPreferences: {
                                    theme: 'DARK'
                                }
                            }
                        });
                    }
                 } catch(err){}
            }, 500);
        });

        setInterval(regenerateEnergy, 1000);
        setInterval(savePlayerData, 5000);
    </script>
</body>
</html>
