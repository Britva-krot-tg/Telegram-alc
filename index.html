<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MINE ALBION COIN</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0b0e14;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: url('bg.png') no-repeat center center;
            background-size: cover;
            background-color: var(--bg-color);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            perspective: 1000px;
        }

        .bg-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1;
            pointer-events: none;
        }

        .header {
            margin-top: 40px;
            text-align: center;
            z-index: 10;
        }

        .score-container {
            font-size: 50px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
        }

        .click-area {
            position: relative;
            flex-grow: 1;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1000px;
            z-index: 5;
        }

        .main-button {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            background: url('coin.png') no-repeat center center;
            background-size: contain;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999; 
            transition: transform 0.15s ease-out, filter 0.15s ease-out;
            transform-style: preserve-3d;
            pointer-events: auto;
            -webkit-tap-highlight-color: transparent;
        }

        .main-button.blocked {
            filter: brightness(0.6) sepia(1) hue-rotate(-50deg) saturate(3) !important;
        }

        .floating-text {
            position: absolute;
            font-size: 28px;
            font-weight: 800;
            color: #ffd700;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
            z-index: 1000;
            text-shadow: 0 2px 10px rgba(255, 215, 0, 0.6);
            transform: translate(-50%, -50%);
        }

        .floating-text.warning {
            color: #ff3333;
            font-size: 22px;
            text-shadow: 0 2px 10px rgba(255, 0, 0, 0.8);
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translate(-50%, -50%) translateY(0) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) translateY(-160px) scale(1.3); }
        }

        .bottom-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 40px;
            gap: 12px;
            z-index: 10;
        }

        .info-panel {
            padding: 12px 30px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-weight: 500;
            color: #e0e0e0;
            backdrop-filter: blur(5px);
        }

        .energy-container {
            width: 70%;
            max-width: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .energy-text {
            font-size: 16px;
            font-weight: 600;
            color: #ffd700;
            text-shadow: 0 1px 5px rgba(0,0,0,0.5);
        }

        .energy-bar-bg {
            width: 100%;
            height: 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            overflow: hidden;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        }

        .energy-bar-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ffa500);
            border-radius: 10px;
            transition: width 0.1s linear;
            box-shadow: 0 0 8px rgba(255, 215, 0, 0.5);
        }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <div class="header">
        <div id="username" style="color: #ccc; margin-bottom: 5px; font-weight: 600;">Игрок</div>
        <div class="score-container">
            <span id="score">0.0000</span>
        </div>
    </div>

    <div class="click-area" id="clickArea">
        <div class="main-button" id="clickBtn"></div>
    </div>

    <div class="bottom-container">
        <div class="info-panel" id="infoPanel">
            Награда: +0.0025 ALC за тап
        </div>
        
        <div class="energy-container">
            <div class="energy-text">⚡ <span id="energyValue">400</span> / 400</div>
            <div class="energy-bar-bg">
                <div class="energy-bar-fill" id="energyFill"></div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        if (tg) {
            tg.expand();
            if (tg.ready) tg.ready();
        }

        const scoreEl = document.getElementById('score');
        const usernameEl = document.getElementById('username');
        const clickBtn = document.getElementById('clickBtn');
        const clickArea = document.getElementById('clickArea');
        const energyValueEl = document.getElementById('energyValue');
        const energyFillEl = document.getElementById('energyFill');

        const REWARD = 0.0025;
        const MAX_CPS = 20; 
        
        // Настройки энергии изменены на 400
        const MAX_ENERGY = 400;
        const REGEN_TIME_MS = 8 * 60 * 60 * 1000; // 8 часов
        const ENERGY_PER_MS = MAX_ENERGY / REGEN_TIME_MS; 

        let score = parseFloat(localStorage.getItem('ton_balance_v3')) || 0;
        scoreEl.innerText = score.toFixed(4);

        // Загрузка сохраненной энергии (если старая энергия больше 400, она автоматически сбросится до максимума)
        let savedEnergy = localStorage.getItem('coin_energy');
        let currentEnergy = savedEnergy !== null ? parseFloat(savedEnergy) : MAX_ENERGY;
        if (currentEnergy > MAX_ENERGY) currentEnergy = MAX_ENERGY;

        let lastClickTime = parseInt(localStorage.getItem('last_click_time')) || Date.now();

        if (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) {
            usernameEl.innerText = tg.initDataUnsafe.user.first_name;
        }

        function regenerateEnergy() {
            const now = Date.now();
            const timePassed = now - lastClickTime;
            
            if (timePassed > 0 && currentEnergy < MAX_ENERGY) {
                currentEnergy += timePassed * ENERGY_PER_MS;
                if (currentEnergy > MAX_ENERGY) currentEnergy = MAX_ENERGY;
            }
            lastClickTime = now;
            localStorage.setItem('last_click_time', lastClickTime);
            localStorage.setItem('coin_energy', currentEnergy);
            
            updateEnergyUI();
        }

        function updateEnergyUI() {
            const displayEnergy = Math.floor(currentEnergy);
            energyValueEl.innerText = displayEnergy;
            const percent = (currentEnergy / MAX_ENERGY) * 100;
            energyFillEl.style.width = percent + '%';
        }

        regenerateEnergy();

        setInterval(() => {
            regenerateEnergy();
        }, 1000);

        let clickTimestamps = [];

        function checkClickRate() {
            const now = Date.now();
            clickTimestamps = clickTimestamps.filter(timestamp => now - timestamp < 1000);
            clickTimestamps.push(now);

            if (clickTimestamps.length > MAX_CPS) {
                return false;
            }
            return true;
        }

        function handleInteraction(clientX, clientY) {
            const isClickValid = checkClickRate();
            if (!isClickValid) {
                clickBtn.classList.add('blocked');
                if (tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
                showWarningText(clientX, clientY, "Too Fast!");
                return;
            }

            regenerateEnergy();

            if (currentEnergy < 1) {
                if (tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('warning');
                showWarningText(clientX, clientY, "No Energy! ⚡");
                
                clickBtn.style.transform = 'scale(0.9)';
                setTimeout(() => clickBtn.style.transform = 'scale(1)', 100);
                return;
            }

            clickBtn.classList.remove('blocked');

            currentEnergy -= 1;
            score += REWARD;
            
            scoreEl.innerText = score.toFixed(4);
            
            lastClickTime = Date.now();
            localStorage.setItem('ton_balance_v3', score);
            localStorage.setItem('coin_energy', currentEnergy);
            localStorage.setItem('last_click_time', lastClickTime);

            updateEnergyUI();

            if (tg && tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('light');
            }

            applyTilt(clientX, clientY);
            showPlusText(clientX, clientY);
        }

        function applyTilt(clientX, clientY) {
            if (clickBtn.classList.contains('blocked') || currentEnergy < 1) return;

            const rect = clickBtn.getBoundingClientRect();
            const coinCenterX = rect.left + rect.width / 2;
            const coinCenterY = rect.top + rect.height / 2;

            const deltaX = clientX - coinCenterX;
            const deltaY = clientY - coinCenterY;

            const percentX = deltaX / (rect.width / 2);
            const percentY = deltaY / (rect.height / 2);

            const maxTilt = 25; 

            const tiltX = -percentY * maxTilt;
            const tiltY = percentX * maxTilt;

            clickBtn.style.transition = 'none';
            clickBtn.style.transform = `rotateX(${tiltX}deg) rotateY(${tiltY}deg) scale(0.95)`;
            clickBtn.style.filter = 'brightness(0.9)';

            setTimeout(() => {
                if (!clickBtn.classList.contains('blocked')) {
                    clickBtn.style.transition = 'transform 0.15s ease-out, filter 0.15s ease-out';
                    clickBtn.style.transform = 'rotateX(0deg) rotateY(0deg) scale(1)';
                    clickBtn.style.filter = 'brightness(1)';
                }
            }, 100);
        }

        setInterval(() => {
            const now = Date.now();
            clickTimestamps = clickTimestamps.filter(timestamp => now - timestamp < 1000);
            if (clickTimestamps.length <= MAX_CPS && currentEnergy >= 1) {
                clickBtn.classList.remove('blocked');
            }
        }, 500);

        clickBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            for (let i = 0; i < e.changedTouches.length; i++) {
                handleInteraction(e.changedTouches[i].clientX, e.changedTouches[i].clientY);
            }
        }, { passive: false });

        clickBtn.addEventListener('mousedown', (e) => {
            handleInteraction(e.clientX, e.clientY);
        });

        function showPlusText(x, y) {
            const text = document.createElement('div');
            text.className = 'floating-text';
            text.innerText = '+' + REWARD.toFixed(4);
            setupFloatingTextPosition(text, x, y);
        }

        function showWarningText(x, y, message) {
            const text = document.createElement('div');
            text.className = 'floating-text warning';
            text.innerText = message;
            setupFloatingTextPosition(text, x, y);
        }

        function setupFloatingTextPosition(text, x, y) {
            const rect = clickArea.getBoundingClientRect();
            const relativeX = x - rect.left;
            const relativeY = y - rect.top;

            text.style.left = relativeX + 'px';
            text.style.top = relativeY + 'px';

            clickArea.appendChild(text);
            setTimeout(() => text.remove(), 800);
        }
    </script>
</body>
</html>
