<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MINE ALBION COIN</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0b0e14;
            --ton-blue: #0088CC;
            --accent-glow: rgba(0, 136, 204, 0.5);
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        .header {
            margin-top: 40px;
            text-align: center;
            z-index: 10;
        }

        .score-container {
            font-size: 50px;
            font-weight: bold;
            text-shadow: 0 0 25px var(--accent-glow);
            display: flex;
            align-items: center;
            gap: 10px;
            font-variant-numeric: tabular-nums;
        }

        .click-area {
            position: relative;
            flex-grow: 1;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .main-button {
            width: 260px;
            height: 260px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #00aaff, #006699);
            box-shadow: 0 0 60px var(--accent-glow), inset 0 0 20px rgba(255,255,255,0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.05s ease;
            border: 6px solid rgba(255, 255, 255, 0.1);
            z-index: 5;
            -webkit-tap-highlight-color: transparent;
        }

        .main-button:active {
            transform: scale(0.94);
        }

        .ton-logo {
            width: 140px;
            height: 140px;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.3));
            pointer-events: none;
        }

        .floating-text {
            position: absolute;
            font-size: 26px;
            font-weight: 800;
            color: #00d4ff;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
            z-index: 100;
            text-shadow: 0 2px 10px rgba(0, 212, 255, 0.6);
            transform: translate(-50%, -50%);
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translate(-50%, -50%) translateY(0) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) translateY(-160px) scale(1.3); }
        }

        .info-panel {
            margin-bottom: 40px;
            padding: 12px 30px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-weight: 500;
            color: #8899a6;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="header">
        <div id="username" style="color: #8899a6; margin-bottom: 5px;">Игрок</div>
        <div class="score-container">
            <span id="score">0.0000</span>
        </div>
    </div>

    <div class="click-area" id="clickArea">
        <div class="main-button" id="clickBtn">
            <svg class="ton-logo" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M50 12L12 45L50 88L88 45L50 12Z" fill="white"/>
                <path d="M32 48H68M40 58H60" stroke="#0088CC" stroke-width="5" stroke-linecap="round"/>
            </svg>
        </div>
    </div>

    <div class="info-panel">
        Награда: +0.0025 ALC за тап
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        if (tg.ready) tg.ready();

        const scoreEl = document.getElementById('score');
        const usernameEl = document.getElementById('username');
        const clickBtn = document.getElementById('clickBtn');
        const clickArea = document.getElementById('clickArea');

        const REWARD = 0.0025;

        let score = parseFloat(localStorage.getItem('ton_balance_v3')) || 0;
        scoreEl.innerText = score.toFixed(4);

        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            usernameEl.innerText = tg.initDataUnsafe.user.first_name;
        }

        function handleInteraction(x, y) {
            score += REWARD;
            scoreEl.innerText = score.toFixed(4);
            localStorage.setItem('ton_balance_v3', score);

            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('light');
            }

            showPlusText(x, y);
        }

        clickBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            for (let i = 0; i < e.changedTouches.length; i++) {
                handleInteraction(e.changedTouches[i].clientX, e.changedTouches[i].clientY);
            }
        }, { passive: false });

        clickBtn.addEventListener('mousedown', (e) => {
            if (!('ontouchstart' in window)) {
                handleInteraction(e.clientX, e.clientY);
            }
        });

        function showPlusText(x, y) {
            const text = document.createElement('div');
            text.className = 'floating-text';
            text.innerText = '+' + REWARD.toFixed(4);
            
            const rect = clickArea.getBoundingClientRect();
            const relativeX = x - rect.left;
            const relativeY = y - rect.top;

            text.style.left = relativeX + 'px';
            text.style.top = relativeY + 'px';

            clickArea.appendChild(text);
            setTimeout(() => text.remove(), 800);
        }
    </script>
</body>
</html>
